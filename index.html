<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MakBak – איסוף הזמנות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0f0d0a;
    --surface:    #1a1714;
    --surface2:   #222018;
    --border:     #2e2a22;
    --amber:      #d4871e;
    --amber-dim:  rgba(212,135,30,.15);
    --green:      #3cb96e;
    --green-dim:  rgba(60,185,110,.12);
    --text:       #f0e8d8;
    --muted:      #8a7e6a;
    --dim:        #4a4438;
    --r:          14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    direction: rtl;
  }

  /* ── HERO ─────────────────────────────────────── */
  .hero {
    padding: 48px 24px 32px;
    text-align: center;
  }

  .logo {
    font-size: 36px;
    font-weight: 900;
    color: var(--amber);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 6px;
  }

  .tagline {
    font-size: 15px;
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 32px;
  }

  /* ── SEARCH ───────────────────────────────────── */
  .search-wrap {
    position: relative;
    max-width: 480px;
    margin: 0 auto;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--r);
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 18px;
    font-weight: 500;
    padding: 16px 52px 16px 16px;
    outline: none;
    direction: rtl;
    transition: border-color .2s, box-shadow .2s;
  }

  .search-input:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 3px var(--amber-dim);
  }

  .search-input::placeholder { color: var(--dim); font-weight: 400; }

  .search-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    pointer-events: none;
  }

  /* ── RESULTS LIST (name suggestions) ─────────── */
  .suggestions {
    max-width: 480px;
    margin: 8px auto 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .suggestion-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color .15s, background .15s;
  }

  .suggestion-item:hover, .suggestion-item:active {
    border-color: var(--amber);
    background: var(--surface2);
  }

  .suggestion-item.collected-item {
    border-color: var(--green);
    opacity: .65;
  }

  .sug-name { font-size: 16px; font-weight: 600; flex: 1; }
  .sug-sheet { font-size: 12px; color: var(--muted); }
  .sug-check { font-size: 18px; color: var(--green); }
  .sug-count { font-size: 12px; color: var(--amber); font-weight: 700; }

  /* ── ORDER CARD (full view) ───────────────────── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }

  .overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .order-sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 560px;
    max-height: 90dvh;
    overflow-y: auto;
    padding: 0 0 40px;
    transform: translateY(40px);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
  }

  .overlay.open .order-sheet { transform: translateY(0); }

  .sheet-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 20px;
  }

  .sheet-header {
    padding: 0 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sheet-name {
    font-size: 22px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 4px;
  }

  .sheet-meta {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* ── PRODUCTS ─────────────────────────────────── */
  .products {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .product-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .product-qty {
    background: var(--amber-dim);
    color: var(--amber);
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 16px;
    font-weight: 900;
    flex-shrink: 0;
    min-width: 40px;
    text-align: center;
  }

  .product-name {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.4;
    flex: 1;
  }

  /* ── NOTES ────────────────────────────────────── */
  .notes-section {
    padding: 0 20px 16px;
  }

  .notes-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 600;
  }

  .notes-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    resize: none;
    height: 72px;
    direction: rtl;
    transition: border-color .2s;
  }

  .notes-input:focus { border-color: var(--amber); }
  .notes-input::placeholder { color: var(--dim); }

  /* ── CTA ──────────────────────────────────────── */
  .cta-area { padding: 0 20px; }

  .btn-big {
    width: 100%;
    border: none;
    border-radius: var(--r);
    padding: 18px;
    font-family: 'Heebo', sans-serif;
    font-size: 17px;
    font-weight: 900;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .3px;
  }

  .btn-collect-main {
    background: var(--green);
    color: #fff;
    margin-bottom: 10px;
  }

  .btn-collect-main:hover { filter: brightness(1.1); }
  .btn-collect-main:active { transform: scale(.98); }

  .btn-collect-main.already {
    background: var(--green-dim);
    color: var(--green);
    border: 1.5px solid var(--green);
  }

  .btn-close {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  /* ── EMPTY / LOADING ──────────────────────────── */
  .center-msg {
    padding: 48px 24px;
    text-align: center;
    color: var(--muted);
  }

  .center-msg .icon { font-size: 36px; margin-bottom: 12px; }
  .center-msg p { font-size: 15px; }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── MANAGER TAB ──────────────────────────────── */
  .manager-btn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 24px;
    color: var(--muted);
    font-family: 'Heebo', sans-serif;
    font-size: 12px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all .2s;
    z-index: 10;
  }

  .manager-btn:hover { border-color: var(--amber); color: var(--amber); }

  /* ── MANAGER VIEW ─────────────────────────────── */
  .manager-view {
    display: none;
    padding: 20px;
    max-width: 600px;
    margin: 0 auto;
  }

  .manager-view.active { display: block; }

  .mgr-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .mgr-title { font-size: 18px; font-weight: 700; color: var(--amber); }

  .mgr-back {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    cursor: pointer;
    padding: 6px 0;
  }

  .mgr-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .mgr-tab {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
  }

  .mgr-tab.active { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }

  .mgr-stats {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }

  .stat-num { font-size: 26px; font-weight: 900; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 11px; color: var(--muted); }

  .mgr-rows { display: flex; flex-direction: column; gap: 8px; }

  .mgr-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .mgr-row.done { border-color: var(--green); opacity: .6; }

  .mgr-row-name { font-size: 15px; font-weight: 600; flex: 1; }
  .mgr-row-count { font-size: 12px; color: var(--amber); }
  .mgr-row-status { font-size: 18px; }

  .user-view { max-width: 560px; margin: 0 auto; padding: 0 20px; }
</style>
</head>
<body>

<!-- USER VIEW -->
<div id="userView">
  <div class="hero">
    <div class="logo">🥃 MakBak</div>
    <div class="tagline">חפש את שמך וראה מה הזמנת</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="search"
             placeholder="הקלד את שמך..." autocomplete="off" autocorrect="off">
    </div>
  </div>

  <div class="user-view">
    <div id="resultArea"></div>
  </div>
</div>

<!-- ORDER SHEET (bottom drawer) -->
<div class="overlay" id="overlay" onclick="closeOrder(event)">
  <div class="order-sheet" id="orderSheet">
    <div class="sheet-handle"></div>

    <div class="sheet-header">
      <div class="sheet-name" id="sheetName"></div>
      <div class="sheet-meta" id="sheetMeta"></div>
    </div>

    <div class="products" id="productsList"></div>

    <div class="notes-section">
      <div class="notes-label">הערה (אופציונלי)</div>
      <textarea class="notes-input" id="notesInput" placeholder="חסר משהו? כתוב כאן..."></textarea>
    </div>

    <div class="cta-area">
      <button class="btn-big btn-collect-main" id="collectBtn" onclick="markCollected()"></button>
      <button class="btn-big btn-close" onclick="closeOrder()">סגור</button>
    </div>
  </div>
</div>

<!-- MANAGER VIEW -->
<div class="manager-view" id="managerView">
  <div class="mgr-header">
    <div class="mgr-title">📋 תצוגת מנהל</div>
    <button class="mgr-back" onclick="toggleManager()">← חזור</button>
  </div>
  <div class="mgr-tabs" id="mgrTabs"></div>
  <div class="mgr-stats" id="mgrStats"></div>
  <div class="mgr-rows" id="mgrRows"></div>
</div>

<!-- MANAGER TOGGLE -->
<button class="manager-btn" id="managerBtn" onclick="toggleManager()">📋 מנהל</button>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxo4SvJ4UIZ4I42JLtKKdE_9AuPnziZ3dxqkHjvkwyRRaep8XSr8gb8fX6MnCHVPO3P/exec';

let allData       = {};   // { sheet: [rows] }
let currentRow    = null;
let managerMode   = false;
let mgrActiveTab  = null;

// ── INIT ──────────────────────────────────────────
loadData();

document.getElementById('searchInput').addEventListener('input', e => {
  renderSearch(e.target.value.trim());
});

// ── DATA ──────────────────────────────────────────
async function loadData() {
  showLoading();
  try {
    const res  = await fetch(`${API_URL}?action=getAll`);
    const json = await res.json();
    if (json.error) throw new Error(json.error);

    allData = {};
    for (const s of json.sheets) allData[s.sheetName] = s.rows || [];

    renderSearch('');
  } catch (err) {
    document.getElementById('resultArea').innerHTML =
      `<div class="center-msg"><p>❌ שגיאה בטעינה: ${err.message}</p></div>`;
  }
}

// ── SEARCH ────────────────────────────────────────
function getAllRows() {
  return Object.entries(allData).flatMap(([sheet, rows]) =>
    rows.map(r => ({ ...r, _sheet: sheet }))
  );
}

function renderSearch(query) {
  const area = document.getElementById('resultArea');
  const rows = getAllRows();

  if (!query) {
    // show all, not collected first
    const sorted = [...rows].sort((a,b) => {
      if (a.collected !== b.collected) return a.collected ? 1 : -1;
      return a.name.localeCompare(b.name, 'he');
    });
    renderSuggestions(sorted, area);
    return;
  }

  const q       = query.toLowerCase();
  const matches = rows.filter(r => r.name.toLowerCase().includes(q));

  if (matches.length === 0) {
    area.innerHTML = `<div class="center-msg"><div class="icon">🤷</div><p>לא נמצא "${query}"</p></div>`;
    return;
  }

  // Single exact match → open immediately
  if (matches.length === 1) {
    renderSuggestions(matches, area);
    openOrder(matches[0]);
    return;
  }

  renderSuggestions(matches, area);
}

function renderSuggestions(rows, container) {
  if (rows.length === 0) {
    container.innerHTML = `<div class="center-msg"><div class="spinner"></div><p>טוען...</p></div>`;
    return;
  }

  container.innerHTML = `<div class="suggestions">
    ${rows.map(r => `
      <div class="suggestion-item ${r.collected ? 'collected-item' : ''}"
           onclick='openOrder(${JSON.stringify(r).replace(/'/g, "&#39;")})'>
        <div>
          <div class="sug-name">${r.name}</div>
          <div class="sug-sheet">${r._sheet}</div>
        </div>
        <span class="sug-count">${r.totalProducts || 0} פריטים</span>
        ${r.collected ? '<span class="sug-check">✓</span>' : ''}
      </div>
    `).join('')}
  </div>`;
}

// ── ORDER DRAWER ──────────────────────────────────
function openOrder(row) {
  currentRow = row;

  document.getElementById('sheetName').textContent = row.name;
  document.getElementById('sheetMeta').innerHTML =
    `<span>${row._sheet}</span><span>${row.phone || ''}</span>`;

  const products = row.products || [];
  document.getElementById('productsList').innerHTML = products.length
    ? products.map(p => `
        <div class="product-row">
          <span class="product-qty">×${p.qty}</span>
          <span class="product-name">${p.name}</span>
        </div>`).join('')
    : '<div class="center-msg"><p>אין פריטים רשומים</p></div>';

  document.getElementById('notesInput').value = row.notes || '';

  const btn = document.getElementById('collectBtn');
  if (row.collected) {
    btn.textContent = '✓ כבר נאסף — בטל';
    btn.classList.add('already');
  } else {
    btn.textContent = '✓ אספתי את ההזמנה שלי';
    btn.classList.remove('already');
  }

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeOrder(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentRow = null;
}

async function markCollected() {
  if (!currentRow) return;

  const row    = currentRow;
  const newVal = !row.collected;
  const notes  = document.getElementById('notesInput').value;

  // Update local
  const sheetRows = allData[row._sheet];
  const localRow  = sheetRows && sheetRows.find(r => r.rowIndex === row.rowIndex);
  if (localRow) { localRow.collected = newVal; localRow.notes = notes; }

  const btn = document.getElementById('collectBtn');
  btn.textContent = '...שומר';
  btn.disabled    = true;

  try {
    const url = `${API_URL}?action=update&sheet=${encodeURIComponent(row._sheet)}&row=${row.rowIndex}&collected=${newVal}&notes=${encodeURIComponent(notes)}`;
    await fetch(url);

    // Close and refresh list
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
    currentRow = null;
    renderSearch(document.getElementById('searchInput').value.trim());
  } catch (err) {
    btn.textContent = row.collected ? '✓ כבר נאסף — בטל' : '✓ אספתי את ההזמנה שלי';
    btn.disabled = false;
    alert('שגיאה: ' + err.message);
  }
}

// ── MANAGER ───────────────────────────────────────
function toggleManager() {
  managerMode = !managerMode;
  document.getElementById('userView').style.display   = managerMode ? 'none' : 'block';
  document.getElementById('managerView').classList.toggle('active', managerMode);
  document.getElementById('managerBtn').textContent   = managerMode ? '← חזור' : '📋 מנהל';

  if (managerMode) renderManager();
}

function renderManager() {
  const sheets = Object.keys(allData);
  if (!mgrActiveTab || !sheets.includes(mgrActiveTab)) mgrActiveTab = sheets[0];

  // Tabs
  document.getElementById('mgrTabs').innerHTML = sheets.map(s =>
    `<button class="mgr-tab ${mgrActiveTab === s ? 'active' : ''}" onclick="setMgrTab('${s}')">${s}</button>`
  ).join('');

  const rows      = allData[mgrActiveTab] || [];
  const total     = rows.length;
  const collected = rows.filter(r => r.collected).length;
  const pending   = total - collected;

  document.getElementById('mgrStats').innerHTML = `
    <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">הזמנות</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--amber)">${pending}</div><div class="stat-label">ממתינות</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--green)">${collected}</div><div class="stat-label">נאספו</div></div>
  `;

  const sorted = [...rows].sort((a,b) => {
    if (a.collected !== b.collected) return a.collected ? 1 : -1;
    return a.name.localeCompare(b.name, 'he');
  });

  document.getElementById('mgrRows').innerHTML = sorted.map(r => `
    <div class="mgr-row ${r.collected ? 'done' : ''}">
      <span class="mgr-row-status">${r.collected ? '✅' : '⏳'}</span>
      <span class="mgr-row-name">${r.name}</span>
      <span class="mgr-row-count">${r.totalProducts} פריטים</span>
    </div>
  `).join('');
}

function setMgrTab(sheet) {
  mgrActiveTab = sheet;
  renderManager();
}

function showLoading() {
  document.getElementById('resultArea').innerHTML =
    `<div class="center-msg"><div class="spinner"></div><p>טוען נתונים...</p></div>`;
}
</script>
</body>
</html>
