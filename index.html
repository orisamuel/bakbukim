<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MakBak – איסוף הזמנות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0d0a;
    --surface: #1a1714;
    --surface2: #252118;
    --border: #2e2a22;
    --amber: #d4871e;
    --amber-light: #e8a84a;
    --amber-dim: #d4871e33;
    --green: #4caf7d;
    --green-dim: #4caf7d22;
    --text: #f0e8d8;
    --text-muted: #8a7e6a;
    --text-dim: #5a5245;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* ===== HEADER ===== */
  header {
    background: linear-gradient(180deg, #1a1510 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .logo {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--amber);
    line-height: 1;
  }

  .logo span {
    color: var(--text-muted);
    font-weight: 300;
    font-size: 14px;
    display: block;
    letter-spacing: 0;
  }

  .stats-bar {
    display: flex;
    gap: 16px;
    margin-right: auto;
    font-size: 13px;
    color: var(--text-muted);
  }

  .stat-item strong {
    color: var(--text);
    font-weight: 700;
  }

  .stat-item.collected strong { color: var(--green); }

  /* ===== SEARCH ===== */
  .search-wrap {
    padding: 0 0 16px;
  }

  .search-box {
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 16px;
    padding: 14px 48px 14px 16px;
    outline: none;
    transition: border-color .2s;
    direction: rtl;
  }

  .search-box input::placeholder { color: var(--text-dim); }
  .search-box input:focus { border-color: var(--amber); }

  .search-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 18px;
  }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 1px;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 10px 16px;
    border-radius: 8px 8px 0 0;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
    position: relative;
  }

  .tab:hover { color: var(--text); background: var(--surface); }

  .tab.active {
    color: var(--amber);
    background: var(--surface);
    border-bottom: 2px solid var(--amber);
  }

  .tab .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--amber-dim);
    color: var(--amber);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    font-weight: 700;
    margin-right: 6px;
  }

  .tab.active .badge { background: var(--amber); color: #000; }

  /* ===== MAIN ===== */
  main {
    padding: 16px;
    max-width: 700px;
    margin: 0 auto;
  }

  /* ===== LOADING ===== */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 40vh;
    gap: 16px;
    color: var(--text-muted);
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== ERROR ===== */
  .error-box {
    background: #2a1515;
    border: 1px solid #5a2020;
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    color: #e07070;
    margin: 20px 0;
  }

  .error-box a {
    color: var(--amber);
    font-size: 13px;
    display: block;
    margin-top: 8px;
    text-decoration: none;
  }

  /* ===== CONFIG SCREEN ===== */
  .config-screen {
    max-width: 480px;
    margin: 60px auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    text-align: center;
  }

  .config-screen h2 {
    font-size: 22px;
    font-weight: 700;
    color: var(--amber);
    margin-bottom: 8px;
  }

  .config-screen p {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .config-screen input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    padding: 12px 14px;
    outline: none;
    direction: ltr;
    margin-bottom: 12px;
  }

  .config-screen input:focus { border-color: var(--amber); }

  .btn-save {
    width: 100%;
    background: var(--amber);
    color: #000;
    font-family: 'Heebo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    padding: 13px;
    cursor: pointer;
    transition: background .2s;
  }

  .btn-save:hover { background: var(--amber-light); }

  /* ===== CARDS ===== */
  .cards { display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .2s;
  }

  .card.collected {
    border-color: var(--green);
    background: #111a14;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
  }

  .card-header:hover { background: rgba(255,255,255,.02); }

  .collected-toggle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all .2s;
    font-size: 14px;
    color: transparent;
  }

  .collected-toggle:hover { border-color: var(--green); }
  .card.collected .collected-toggle {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }

  .card-name {
    font-size: 16px;
    font-weight: 700;
    flex: 1;
  }

  .card.collected .card-name {
    color: var(--text-muted);
    text-decoration: line-through;
  }

  .card-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .card-project {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .items-count {
    font-size: 12px;
    color: var(--amber);
    font-weight: 600;
  }

  .expand-arrow {
    color: var(--text-dim);
    font-size: 12px;
    transition: transform .2s;
    flex-shrink: 0;
  }

  .card.open .expand-arrow { transform: rotate(180deg); }

  /* ===== CARD BODY ===== */
  .card-body {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
  }

  .card.open .card-body { display: block; }

  .products-list {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .product-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
  }

  .product-qty {
    background: var(--amber-dim);
    color: var(--amber);
    border-radius: 6px;
    padding: 2px 10px;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
    min-width: 32px;
    text-align: center;
  }

  .product-name {
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.4;
  }

  .card-actions {
    margin-top: 14px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .notes-area {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    resize: none;
    height: 60px;
    direction: rtl;
    margin-top: 10px;
    transition: border-color .2s;
  }

  .notes-area:focus { border-color: var(--amber); }
  .notes-area::placeholder { color: var(--text-dim); }

  .btn-collect {
    flex: 1;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid var(--green);
  }

  .btn-collect:hover { background: var(--green); color: #fff; }
  .card.collected .btn-collect {
    background: var(--surface2);
    color: var(--text-muted);
    border-color: var(--border);
  }

  .btn-save-notes {
    background: var(--amber-dim);
    color: var(--amber);
    border: 1px solid var(--amber);
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }

  .btn-save-notes:hover { background: var(--amber); color: #000; }

  /* saving indicator */
  .saving-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--amber);
    animation: pulse 1s ease-in-out infinite;
    margin-right: 6px;
  }

  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

  /* ===== EMPTY STATE ===== */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--text-dim); }
  .empty p { font-size: 14px; }

  /* ===== MANAGER VIEW ===== */
  .manager-summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    text-align: center;
  }

  .summary-item { }
  .summary-num {
    font-size: 28px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 4px;
  }

  .summary-item:nth-child(1) .summary-num { color: var(--text); }
  .summary-item:nth-child(2) .summary-num { color: var(--amber); }
  .summary-item:nth-child(3) .summary-num { color: var(--green); }

  .summary-label {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ===== FLOATING REFRESH ===== */
  .fab {
    position: fixed;
    bottom: 24px;
    left: 24px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
    z-index: 50;
  }

  .fab:hover { border-color: var(--amber); color: var(--amber); }
  .fab.spinning { color: var(--amber); }
  .fab.spinning svg { animation: spin .8s linear infinite; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 480px) {
    .stats-bar { display: none; }
    .logo { font-size: 22px; }
    .manager-summary { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .summary-num { font-size: 22px; }
  }
</style>
</head>
<body>

<!-- CONFIG SCREEN (shown if no API URL set) -->
<div id="configScreen" class="config-screen" style="display:none">
  <h2>🥃 MakBak</h2>
  <p>הדבק את ה-URL של ה-Apps Script<br>שפרסת מ-Google</p>
  <input type="text" id="apiUrlInput" placeholder="https://script.google.com/macros/s/.../exec" dir="ltr">
  <button class="btn-save" onclick="saveConfig()">שמור והתחל</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <header>
    <div class="header-top">
      <div class="logo">MakBak 🥃<span>איסוף הזמנות</span></div>
      <div class="stats-bar" id="statsBar"></div>
    </div>
    <div class="search-wrap">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="search" id="searchInput" placeholder="חפש לפי שם..." autocomplete="off">
      </div>
    </div>
    <div class="tabs" id="tabsBar"></div>
  </header>

  <main id="mainContent">
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <span>טוען נתונים...</span>
    </div>
  </main>
</div>

<!-- FAB Refresh -->
<button class="fab" id="fabRefresh" title="רענן" style="display:none" onclick="refreshData()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="1 4 1 10 7 10"></polyline>
    <path d="M3.51 15a9 9 0 1 0 .49-3.3"></path>
  </svg>
</button>

<script>
// ==========================================
// CONFIG
// ==========================================
const CONFIG_KEY = 'makbak_api_url';
let API_URL = localStorage.getItem(CONFIG_KEY) || '';

function saveConfig() {
  const val = document.getElementById('apiUrlInput').value.trim();
  if (!val) return;
  API_URL = val;
  localStorage.setItem(CONFIG_KEY, val);
  init();
}

// ==========================================
// STATE
// ==========================================
let allData = {};      // { sheetName: [rows...] }
let activeTab = null;
let searchQuery = '';
let saving = {};       // rowKey → true/false

// ==========================================
// INIT
// ==========================================
function init() {
  if (!API_URL) {
    document.getElementById('configScreen').style.display = 'block';
    document.getElementById('app').style.display = 'none';
    document.getElementById('fabRefresh').style.display = 'none';
    return;
  }
  document.getElementById('configScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('fabRefresh').style.display = 'flex';
  loadData();

  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    renderCurrentTab();
  });
}

// ==========================================
// FETCH DATA
// ==========================================
async function loadData() {
  showLoading();
  try {
    const res = await fetch(`${API_URL}?action=getAll`);
    const json = await res.json();
    if (json.error) throw new Error(json.error);

    allData = {};
    for (const sheet of json.sheets) {
      allData[sheet.sheetName] = sheet.rows || [];
    }

    buildTabs();
    updateStats();
    renderCurrentTab();

  } catch (err) {
    showError(err.message);
  }
}

async function refreshData() {
  const fab = document.getElementById('fabRefresh');
  fab.classList.add('spinning');
  await loadData();
  fab.classList.remove('spinning');
}

// ==========================================
// TABS
// ==========================================
function buildTabs() {
  const bar = document.getElementById('tabsBar');
  const sheets = Object.keys(allData);

  // Add "הכל" tab
  const allTabs = ['הכל', ...sheets];
  if (!activeTab || !allTabs.includes(activeTab)) {
    activeTab = 'הכל';
  }

  bar.innerHTML = allTabs.map(name => {
    const rows = name === 'הכל'
      ? Object.values(allData).flat()
      : (allData[name] || []);
    const pending = rows.filter(r => !r.collected).length;

    return `<button class="tab ${activeTab === name ? 'active' : ''}" onclick="switchTab('${name}')">
      ${name}
      ${pending > 0 ? `<span class="badge">${pending}</span>` : ''}
    </button>`;
  }).join('');
}

function switchTab(name) {
  activeTab = name;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  buildTabs();
  renderCurrentTab();
}

// ==========================================
// RENDER
// ==========================================
function getCurrentRows() {
  let rows;
  if (activeTab === 'הכל') {
    rows = Object.entries(allData).flatMap(([sheet, r]) =>
      r.map(row => ({ ...row, _sheet: sheet }))
    );
  } else {
    rows = (allData[activeTab] || []).map(r => ({ ...r, _sheet: activeTab }));
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    rows = rows.filter(r =>
      r.name.toLowerCase().includes(q) ||
      (r.phone && r.phone.includes(q))
    );
  }

  // Sort: not collected first, then by name
  rows.sort((a, b) => {
    if (a.collected !== b.collected) return a.collected ? 1 : -1;
    return a.name.localeCompare(b.name, 'he');
  });

  return rows;
}

function renderCurrentTab() {
  const main = document.getElementById('mainContent');
  const rows = getCurrentRows();

  if (rows.length === 0) {
    main.innerHTML = searchQuery
      ? `<div class="empty"><div class="empty-icon">🔍</div><h3>אין תוצאות</h3><p>לא נמצאו הזמנות עבור "${searchQuery}"</p></div>`
      : `<div class="empty"><div class="empty-icon">📦</div><h3>אין הזמנות</h3><p>הגליון ריק או טרם נטען</p></div>`;
    return;
  }

  // Manager summary for "הכל"
  let summaryHtml = '';
  if (activeTab === 'הכל') {
    const total = rows.length;
    const collected = rows.filter(r => r.collected).length;
    const pending = total - collected;
    const pct = total ? Math.round((collected / total) * 100) : 0;

    summaryHtml = `<div class="manager-summary">
      <div class="summary-item"><div class="summary-num">${total}</div><div class="summary-label">סה"כ הזמנות</div></div>
      <div class="summary-item"><div class="summary-num">${pending}</div><div class="summary-label">ממתינות לאיסוף</div></div>
      <div class="summary-item"><div class="summary-num">${pct}%</div><div class="summary-label">נאספו</div></div>
    </div>`;
  }

  const cards = rows.map(row => renderCard(row)).join('');
  main.innerHTML = summaryHtml + `<div class="cards">${cards}</div>`;
}

function renderCard(row) {
  const key = `${row._sheet}::${row.rowIndex}`;
  const isSaving = saving[key];
  const notesVal = (row.notes || '').replace(/"/g, '&quot;');

  const productsHtml = row.products.length > 0
    ? `<div class="products-list">${row.products.map(p =>
        `<div class="product-row">
          <span class="product-qty">×${p.qty}</span>
          <span class="product-name">${p.name}</span>
        </div>`
      ).join('')}</div>`
    : '<p style="color:var(--text-dim);font-size:13px;margin-top:8px">אין פריטים רשומים</p>';

  const collectLabel = row.collected ? '✓ נאסף' : 'סמן כנאסף';

  return `<div class="card ${row.collected ? 'collected' : ''}" id="card-${key.replace('::', '-')}">
    <div class="card-header" onclick="toggleCard('${key}')">
      <button class="collected-toggle" onclick="toggleCollected(event, '${row._sheet}', ${row.rowIndex})">${row.collected ? '✓' : ''}</button>
      <div class="card-name">${row.name}</div>
      <div class="card-meta">
        ${activeTab === 'הכל' ? `<span class="card-project">${row._sheet}</span>` : ''}
        ${row.products.length > 0 ? `<span class="items-count">${row.totalProducts} פריטים</span>` : ''}
      </div>
      ${isSaving ? '<span class="saving-dot"></span>' : ''}
      <span class="expand-arrow">▾</span>
    </div>
    <div class="card-body">
      ${productsHtml}
      <textarea class="notes-area" placeholder="הערות..." id="notes-${key.replace('::', '-')}">${notesVal}</textarea>
      <div class="card-actions">
        <button class="btn-collect" onclick="toggleCollected(event, '${row._sheet}', ${row.rowIndex})">${collectLabel}</button>
        <button class="btn-save-notes" onclick="saveNotes('${row._sheet}', ${row.rowIndex}, '${key}')">שמור הערה</button>
      </div>
    </div>
  </div>`;
}

function toggleCard(key) {
  const id = 'card-' + key.replace('::', '-');
  const card = document.getElementById(id);
  if (card) card.classList.toggle('open');
}

// ==========================================
// ACTIONS
// ==========================================
async function toggleCollected(event, sheet, rowIndex) {
  event.stopPropagation();
  const key = `${sheet}::${rowIndex}`;

  // Find the row in allData
  const sheetRows = allData[sheet];
  if (!sheetRows) return;
  const rowIdx = sheetRows.findIndex(r => r.rowIndex === rowIndex);
  if (rowIdx === -1) return;

  const row = sheetRows[rowIdx];
  const newVal = !row.collected;

  // Optimistic update
  row.collected = newVal;
  saving[key] = true;
  renderCurrentTab();

  try {
    const url = `${API_URL}?action=update&sheet=${encodeURIComponent(sheet)}&row=${rowIndex}&collected=${newVal}&notes=${encodeURIComponent(row.notes || '')}`;
    const res = await fetch(url);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
  } catch (err) {
    // Revert
    row.collected = !newVal;
    alert('שגיאה בשמירה: ' + err.message);
  } finally {
    delete saving[key];
    updateStats();
    renderCurrentTab();
  }
}

async function saveNotes(sheet, rowIndex, key) {
  const safeKey = key.replace('::', '-');
  const textarea = document.getElementById(`notes-${safeKey}`);
  if (!textarea) return;
  const notes = textarea.value;

  const sheetRows = allData[sheet];
  if (!sheetRows) return;
  const row = sheetRows.find(r => r.rowIndex === rowIndex);
  if (!row) return;

  saving[key] = true;
  row.notes = notes;

  try {
    const url = `${API_URL}?action=update&sheet=${encodeURIComponent(sheet)}&row=${rowIndex}&collected=${row.collected}&notes=${encodeURIComponent(notes)}`;
    await fetch(url);
  } catch (err) {
    alert('שגיאה: ' + err.message);
  } finally {
    delete saving[key];
    renderCurrentTab();
  }
}

// ==========================================
// STATS
// ==========================================
function updateStats() {
  const bar = document.getElementById('statsBar');
  const all = Object.values(allData).flat();
  const total = all.length;
  const collected = all.filter(r => r.collected).length;

  bar.innerHTML = `
    <span class="stat-item"><strong>${total}</strong> הזמנות</span>
    <span class="stat-item collected"><strong>${collected}</strong> נאספו</span>
  `;
}

// ==========================================
// LOADING / ERROR
// ==========================================
function showLoading() {
  document.getElementById('mainContent').innerHTML = `
    <div class="loading"><div class="spinner"></div><span>טוען נתונים...</span></div>`;
}

function showError(msg) {
  document.getElementById('mainContent').innerHTML = `
    <div class="error-box">
      <strong>שגיאה בטעינת הנתונים</strong>
      <p style="font-size:13px;margin-top:6px">${msg}</p>
      <a href="#" onclick="localStorage.removeItem('${CONFIG_KEY}');location.reload()">🔄 שנה URL</a>
    </div>`;
}

// ==========================================
// START
// ==========================================
init();
</script>
</body>
</html>
